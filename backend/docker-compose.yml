version: "3.9"

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: signal
      POSTGRES_USER: signal
      POSTGRES_PASSWORD: signal
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://signal:signal@postgres:5432/signal
      SIGNAL_BACKEND_HOST: 0.0.0.0
      SIGNAL_BACKEND_PORT: 8080
      DATABASE_MAX_CONNECTIONS: 5
      CORS_ALLOW_ORIGIN: "*"
      RUST_LOG: signal_backend=debug,tower_http=info
    ports:
      - "8080:8080"

volumes:
  postgres-data:
